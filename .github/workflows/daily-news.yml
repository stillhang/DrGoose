name: Daily AI News

on:
  schedule:
    - cron: '0 1 * * *'   # 每天北京时间 09:00
  workflow_dispatch:        # 允许手动触发

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Fetch news & generate post
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SITE_URL: https://liaoshihang.com
        run: python scripts/fetch_news.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          if git diff --cached --quiet; then
            echo "HAS_NEW=false" >> $GITHUB_ENV
          else
            git commit -m "📰 AI 日报 $(date +%Y-%m-%d)"
            echo "HAS_NEW=true" >> $GITHUB_ENV
          fi

      - name: Setup Hugo
        if: env.HAS_NEW == 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.151.0'
          extended: true

      - name: Build site
        if: env.HAS_NEW == 'true'
        run: hugo --minify

      - name: Add CNAME
        if: env.HAS_NEW == 'true'
        run: echo "liaoshihang.com" > ./public/CNAME

      - name: Deploy to GitHub Pages
        if: env.HAS_NEW == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Push source commit
        if: env.HAS_NEW == 'true'
        run: git push
